<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* --- CSV Helper Logic --- */
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return { headers: [], rows: [] };
  function splitLine(line) {
    const fields = []; let cur = ''; let inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { if (inQuote && line[i+1] === '"') { cur += '"'; i++; } else { inQuote = !inQuote; } }
      else if (ch === ',' && !inQuote) { fields.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    fields.push(cur.trim()); return fields;
  }
  const headers = splitLine(lines[0]).map(h => h.toLowerCase().replace(/\s+/g, '_'));
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = splitLine(lines[i]); if (vals.length < 2) continue;
    const obj = {}; headers.forEach((h, idx) => { obj[h] = vals[idx] ?? ''; });
    rows.push(obj);
  }
  return { headers, rows };
}

function parseLastSeen(str) {
  if (!str) return null;
  str = str.trim().replace(/"/g, '');
  const d = new Date(str); if (!isNaN(d)) return d;
  const norm = str.replace(/p\.\s*m\./i, 'PM').replace(/a\.\s*m\./i, 'AM');
  const m = norm.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):(\d{2}):(\d{2})\s*(AM|PM)/i);
  if (!m) return null;
  let [, month, day, year, hour, min, sec, ampm] = m;
  hour = parseInt(hour, 10);
  if (ampm.toUpperCase() === 'PM' && hour < 12) hour += 12;
  if (ampm.toUpperCase() === 'AM' && hour === 12) hour = 0;
  return new Date(year, month - 1, day, hour, parseInt(min), parseInt(sec));
}

function deviceType(username) {
  if (!username) return 'other';
  const u = username.trim().toUpperCase();
  if (u.startsWith('HH')) return 'HH';
  if (u.startsWith('T')) return 'T';
  return 'other';
}

function classify(lastSeen, now) {
  if (!lastSeen) return 'offline';
  const diffMs = now - lastSeen;
  const diffDays = diffMs / (1000 * 60 * 60 * 24);
  if (diffDays <= 1) return 'online';
  if (diffDays <= 3) return 'warn';
  return 'offline';
}

function DashboardView({ data, onBack, user }) {
  const dashRef = useRef(null);
  const chartsRef = useRef({});
  const getPlazaLogo = (p) => {
    if (!p) return null;
    let name = p.toUpperCase().trim();
    if (name === "CV VICTORIA") name = "CD VICTORIA";
    return `logos/${name}.png`;
  };
  const plazaLogo = getPlazaLogo(user.plaza);

  useEffect(() => {
    // 1. Garantías por Tipo (T, HH, Imp)
    const ctx1 = document.getElementById('chart-gar-tipo').getContext('2d');
    chartsRef.current.garTipo = new Chart(ctx1, {

function Icon({ name, size = 16 }){
  const p = { width:size, height:size, viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", strokeWidth:1.6, strokeLinecap:"round", strokeLinejoin:"round" };
  switch(name){
    case "tablet": return <svg {...p}><rect x="5" y="3" width="14" height="18" rx="2"/><line x1="12" y1="18" x2="12" y2="18.01"/></svg>;
    case "scanner": return <svg {...p}><rect x="6" y="3" width="12" height="18" rx="2"/><path d="M9 7h6"/><rect x="9" y="11" width="6" height="6" rx="1"/></svg>;
    case "printer": return <svg {...p}><path d="M6 9V3h12v6"/><rect x="4" y="9" width="16" height="9" rx="2"/><rect x="7" y="14" width="10" height="6"/></svg>;
    case "check": return <svg {...p} strokeWidth="2.2"><polyline points="20 6 9 17 4 12"/></svg>;
    case "x": return <svg {...p} strokeWidth="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    case "chev": return <svg {...p}><polyline points="6 9 12 15 18 9"/></svg>;
    case "save": return <svg {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
    case "info": return <svg {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>;
    case "movilidad": return <svg {...p}><path d="M3 17V8a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v9"/><path d="M18 11h2.5a1.5 1.5 0 0 1 1.5 1.5V17"/><path d="M2 17h20"/><circle cx="7" cy="19" r="2"/><circle cx="17" cy="19" r="2"/></svg>;
    case "alert": return <svg {...p}><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
    case "back": return <svg {...p}><path d="m15 18-6-6 6-6"/></svg>;
    default: return null;
  }
}

function Field({ label, prefix, value, onChange, type="text", as="input", options, readOnly }){
  return (
    <div className="field">
      <label className="field__label">{label}</label>
      <div className={"input" + (readOnly ? " input--readonly" : "")}>
        {prefix && <span className="input__prefix">{prefix}</span>}
        {as === "select" ? (
          <>
            <select value={value} onChange={(e)=>onChange?.(e.target.value)}>
              {options.map(o => <option key={o} value={o}>{o}</option>)}
            </select>
            <span className="input__caret"><Icon name="chev" /></span>
          </>
        ) : (
          <input type={type} value={value} readOnly={readOnly} onChange={(e)=>onChange?.(e.target.value)} />
        )}
      </div>
    </div>
  );
}

  useEffect(() => {
    const savedUser = localStorage.getItem('user');
    if (savedUser) {
      const parsed = JSON.parse(savedUser);
      setUser({
        name: parsed.usuario,
        initials: (parsed.usuario).substring(0, 2).toUpperCase(),
        plaza: parsed.plaza
      });
    } else {
      window.location.href = 'login.html';
    }
  }, []);

  const handleFileUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setCsvFile(file);
    const reader = new FileReader();
    reader.onload = (ev) => {
      const { rows } = parseCSV(ev.target.result);
      const now = new Date();
      const parsed = rows.map(r => {
        const ls = parseLastSeen(r['last_seen']);
        return {
          lastSeen: ls,
          username: r['username'] || '',
          type: deviceType(r['username']),
          status: classify(ls, now),
        };
      }).filter(r => r.lastSeen !== null || r.username);
      setCsvData(parsed);
    };
    reader.readAsText(file);
  };

  const getDashboardData = () => {
    const conn = {
      online: { HH: 0, T: 0, other: 0, total: 0 },
      warn: { HH: 0, T: 0, other: 0, total: 0 },
      offline: { HH: 0, T: 0, other: 0, total: 0 }
    };
    csvData.forEach(r => {
      conn[r.status][r.type]++;
      conn[r.status].total++;
    });
    return { mes, general, garantias, depreciados, stock, conn };
  };

  const handleGenerateDashboard = async () => {
    const data = getDashboardData();
    // Guardado automático
    try {
      const resp = await fetch('/api/movilidad/guardar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          mes: data.mes,
          plaza: user.plaza || 'Cd. Valles',
          usuario: user.name,
          general: data.general,
          garantias: data.garantias,
          depreciados: data.depreciados,
          stock: data.stock,
          conectividad: data.conn
        })
      });
      const res = await resp.json();
      if (!res.success) console.error("Error guardando reporte:", res.message);
    } catch (e) { 
      console.error("Error al conectar con servidor para guardado automático:", e);
    }
    setView("dash");
  };

  const goPortal = () => window.location.href = 'portal.html';
  const logout = () => { localStorage.removeItem('user'); window.location.href = 'login.html'; };

  if (view === "dash") {
    return (
      <DashboardView data={getDashboardData()} onBack={() => setView("form")} user={user} />
    );
  }

  return (
    <>
      <header className="p-header">
        <div className="p-header__left" style={{gap:20, alignItems:'center'}}>
          <img className="p-logo" src="logos/tamaulipas.PNG" alt="OXXO Tamaulipas" style={{height:45}} />
          <img className="p-logo" src="logos/ti.png" alt="TI" style={{height:60}} />
          {user.plaza && <img className="p-logo" src={`logos/${user.plaza.toUpperCase().trim() === "CV VICTORIA" ? "CD VICTORIA" : user.plaza.toUpperCase().trim()}.png`} alt="Plaza" style={{height:80}} />}
        </div>

        <div className="p-header__center">
          <h1 className="p-title">TI Región Tamaulipas</h1>
          <p className="p-subtitle">Portal de aplicaciones</p>
        </div>

        <div className="p-header__right">
          <div className="p-user">
            <div className="p-avatar">{user.initials}</div>
            <div className="p-user__meta">
              <span className="p-user__name">{user.name}</span>
              <span className="p-user__role">Administrador</span>
            </div>
          </div>
          <button className="p-signout" onClick={logout}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><path d="m16 17 5-5-5-5" /><path d="M21 12H9" />
            </svg>
            Salir
          </button>
        </div>
      </header>

      <div className="subnav">
        <h2 className="subnav__title">
          <button className="btn-back-portal" onClick={goPortal} style={{marginRight:14, padding: '4px 10px'}}>
            <Icon name="back" size={12}/> Regresar
          </button>
          <span className="crumb">Portal</span>
          <span className="sep">/</span>
          <span>Estatus de Movilidad</span>
        </h2>

        <div style={{marginLeft: 'auto'}}>
           <div style={{fontSize: 12, color: 'var(--c-ink-muted-48)', fontWeight: 500}}>Paso {step} de 5</div>
        </div>
      </div>

      <main className="page">
        {step === 1 && (
        <section className="section">
          <div className="section__head">
            <h3 className="section__title"><span className="section__num">1</span> General</h3>
            <span className="ph__sub" style={{marginLeft:'auto', fontSize:11}}>Mes del reporte, tiendas & SI de reposición segun el proveedor</span>
          </div>
          <div className="grid grid--2" style={{marginBottom: 20}}>
             <Field label="MES A CAPTURAR" type="month" value={mes} onChange={(v)=>setMes(v)} />
             <Field label="NÚMERO DE TIENDAS" prefix="#" value={general.tiendas} onChange={(v)=>setGeneral(s=>({...s, tiendas:v}))} />
          </div>
          <div className="grid grid--2">
            <Field label="FOLIO DE SI (REPOSICIÓN)" prefix="#" value={general.folio} onChange={(v)=>setGeneral(s=>({...s, folio:v}))} placeholder="Ej. SI-12345" />
            <div className="field">
              <label className="field__label">ESTATUS DE LA SI</label>
              <div className="input">
                <select value={general.estatus} onChange={(e)=>setGeneral(s=>({...s, estatus:e.target.value}))}>
                   <option>Seleccione estatus...</option><option>Recibida</option><option>En tránsito</option><option>Procesada</option><option>No solicitada</option>
                </select>
                <span className="input__caret"><Icon name="chev" /></span>
              </div>
            </div>
          </div>
          <div style={{marginTop:32, display:'flex', justifyContent:'flex-end'}}>
             <button className="btn-primary" onClick={()=>setStep(2)}>Siguiente <Icon name="chev" size={14} style={{transform:'rotate(-90deg)'}}/></button>
          </div>
        </section>
        )}

        {step === 2 && (
        <section className="section">
          <div className="section__head">
            <h3 className="section__title"><span className="section__num">2</span> Garantías</h3>
            <span className="ph__sub" style={{marginLeft:'auto', fontSize:11}}>Equipos con y sin garantía vigente</span>
          </div>
          <div className="group">
            {[
              { id: 'tablets', name: 'Tablets', icon: 'tablet' },
              { id: 'handheld', name: 'Hand Held', icon: 'scanner' },
              { id: 'impresoras', name: 'Impresoras', icon: 'printer' }
            ].map(d => (
              <div className="card" key={d.id} style={{padding:16}}>
                <div className="card__head" style={{marginBottom:12, borderBottom:'1px solid var(--c-divider-soft)', paddingBottom:8}}>
                  <div className="card__icon" style={{background:'var(--c-primary)', color:'#fff'}}><Icon name={d.icon} size={12}/></div>
                  <span style={{fontWeight:700, fontSize:13}}>{d.name}</span>
                </div>
                <Field label="CON GARANTÍA" prefix={<Icon name="check" size={10}/>} value={garantias[d.id].con} onChange={(v)=>setGarantias(s=>({...s, [d.id]:{...s[d.id], con:v}}))} />
                <div style={{marginTop:8}}>
                  <Field label="SIN GARANTÍA" prefix={<Icon name="x" size={10}/>} value={garantias[d.id].sin} onChange={(v)=>setGarantias(s=>({...s, [d.id]:{...s[d.id], sin:v}}))} />
                </div>
              </div>
            ))}
          </div>
          <div style={{marginTop:32, display:'flex', justifyContent:'space-between'}}>
             <button className="btn-pearl" onClick={()=>setStep(1)}><Icon name="back" size={14}/> Anterior</button>
             <button className="btn-primary" onClick={()=>setStep(3)}>Siguiente <Icon name="chev" size={14} style={{transform:'rotate(-90deg)'}}/></button>
          </div>
        </section>
        )}

        {step === 3 && (
        <section className="section">
          <div className="section__head">
            <h3 className="section__title"><span className="section__num">3</span> Equipo Depreciado</h3>
            <span className="ph__sub" style={{marginLeft:'auto', fontSize:11}}>Unidades que ya completaron su vida útil segun el MAF</span>
          </div>
          <div className="grid grid--3">
            <Field label="HAND HELD DEPRECIADOS" prefix={<Icon name="scanner" size={12}/>} value={depreciados.handheld} onChange={(v)=>setDepreciados(s=>({...s, handheld:v}))} />
            <Field label="TABLETS DEPRECIADAS" prefix={<Icon name="tablet" size={12}/>} value={depreciados.tablets} onChange={(v)=>setDepreciados(s=>({...s, tablets:v}))} />
            <Field label="IMPRESORAS DEPRECIADAS" prefix={<Icon name="printer" size={12}/>} value={depreciados.impresoras} onChange={(v)=>setDepreciados(s=>({...s, impresoras:v}))} />
          </div>
          <div style={{marginTop:32, display:'flex', justifyContent:'space-between'}}>
             <button className="btn-pearl" onClick={()=>setStep(2)}><Icon name="back" size={14}/> Anterior</button>
             <button className="btn-primary" onClick={()=>setStep(4)}>Siguiente <Icon name="chev" size={14} style={{transform:'rotate(-90deg)'}}/></button>
          </div>
        </section>
        )}

        {step === 4 && (
        <section className="section">
          <div className="section__head">
            <h3 className="section__title"><span className="section__num">4</span> Stock Disponible</h3>
            <span className="ph__sub" style={{marginLeft:'auto', fontSize:11}}>Unidades en almacén listas para asignar</span>
          </div>
          <div className="grid grid--3">
            <Field label="TABLETS EN STOCK" prefix={<Icon name="tablet" size={12}/>} value={stock.tablets} onChange={(v)=>setStock(s=>({...s, tablets:v}))} />
            <Field label="HAND HELD EN STOCK" prefix={<Icon name="scanner" size={12}/>} value={stock.handheld} onChange={(v)=>setStock(s=>({...s, handheld:v}))} />
            <Field label="IMPRESORAS EN STOCK" prefix={<Icon name="printer" size={12}/>} value={stock.impresoras} onChange={(v)=>setStock(s=>({...s, impresoras:v}))} />
          </div>
          <div style={{marginTop:32, display:'flex', justifyContent:'space-between'}}>
             <button className="btn-pearl" onClick={()=>setStep(3)}><Icon name="back" size={14}/> Anterior</button>
             <button className="btn-primary" onClick={()=>setStep(5)}>Siguiente <Icon name="chev" size={14} style={{transform:'rotate(-90deg)'}}/></button>
          </div>
        </section>
        )}

        {step === 5 && (
        <section className="section">
          <div className="section__head">
            <h3 className="section__title"><span className="section__num">5</span> Carga de Conectividad (CSV)</h3>
          </div>
          <div className="field">
            <label className="field__label">Archivo de Intune / Airwatch</label>
            <div style={{
              border: '2px dashed var(--c-hairline)',
              borderRadius: 14,
              padding: 40,
              textAlign: 'center',
              background: 'var(--c-pearl)'
            }}>
              <p style={{marginBottom: 10, fontSize: 14, color: 'var(--c-ink-muted-48)'}}>
                {csvFile ? `Archivo cargado: ${csvFile.name} (${csvData.length} registros)` : "Arrastra aquí tu reporte de MDN Gema CSV o haz clic para buscar"}
              </p>
              <input type="file" accept=".csv" onChange={handleFileUpload} />
            </div>
          </div>
          <div style={{marginTop:32, display:'flex', justifyContent:'space-between'}}>
             <button className="btn-pearl" onClick={()=>setStep(4)}><Icon name="back" size={14}/> Anterior</button>
             <button className="btn-primary" onClick={handleGenerateDashboard}>Generar Dashboard</button>
          </div>
        </section>
        )}
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
