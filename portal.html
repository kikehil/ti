<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Portal · TI Región Tamaulipas</title>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>

  <style>
    /* —— Apple design system — locales —— */
    :root {
      --c-primary: #0066cc;
      --c-primary-focus: #0071e3;
      --c-primary-on-dark: #2997ff;
      --c-ink: #1d1d1f;
      --c-ink-muted-80: #333;
      --c-ink-muted-48: #7a7a7a;
      --c-divider-soft: #f0f0f0;
      --c-hairline: #e0e0e0;
      --c-canvas: #ffffff;
      --c-parchment: #f5f5f7;
      --c-pearl: #fafafc;
      --c-tile-1: #272729;
      --c-tile-2: #2a2a2c;
      --c-tile-3: #252527;
      --c-black: #000000;
      --c-on-dark: #ffffff;
      --c-body-muted: #cccccc;

      /* OXXO accents (used sparingly only on the OXXO logo and as deep red accent on dark) */
      --c-oxxo-red: #e30613;
      --c-oxxo-yellow: #fcb813;

      --f-display: "SF Pro Display", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --f-text: "SF Pro Text", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #e8e8ea;
      font-family: var(--f-text);
      color: var(--c-ink);
      -webkit-font-smoothing: antialiased
    }

    /* ─────────────────────────────────────────────────────────────
     PORTAL — shared component styles, scoped to .portal
     ───────────────────────────────────────────────────────────── */
    .portal {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--portal-bg);
      color: var(--portal-ink);
      font-family: var(--f-text);
      overflow: auto;
    }

    .portal--light {
      --portal-bg: var(--c-canvas);
      --portal-ink: var(--c-ink);
      --portal-subink: var(--c-ink-muted-80);
      --portal-mute: var(--c-ink-muted-48);
      --portal-hairline: var(--c-hairline);
      --portal-divider: var(--c-divider-soft);
      --portal-tile-bg: var(--c-canvas);
      --portal-tile-bg-2: var(--c-parchment);
      --portal-link: var(--c-primary);
      --portal-header-bg: var(--c-canvas);
      --portal-header-ink: var(--c-ink);
      --portal-icon-bg: var(--c-canvas);
      --portal-icon-border: var(--c-hairline);
      --portal-icon-glyph: var(--c-ink);
      --portal-icon-accent: var(--c-primary);
      --portal-shadow: 0 1px 2px rgba(0, 0, 0, .04), 0 8px 24px rgba(0, 0, 0, .05);
    }

    .portal--dark {
      --portal-bg: var(--c-tile-1);
      --portal-ink: var(--c-on-dark);
      --portal-subink: var(--c-body-muted);
      --portal-mute: #8a8a8d;
      --portal-hairline: rgba(255, 255, 255, .10);
      --portal-divider: rgba(255, 255, 255, .06);
      --portal-tile-bg: var(--c-tile-2);
      --portal-tile-bg-2: var(--c-tile-3);
      --portal-link: var(--c-primary-on-dark);
      --portal-header-bg: var(--c-black);
      --portal-header-ink: var(--c-on-dark);
      --portal-icon-bg: var(--c-tile-2);
      --portal-icon-border: rgba(255, 255, 255, .08);
      --portal-icon-glyph: var(--c-on-dark);
      --portal-icon-accent: var(--c-primary-on-dark);
      --portal-shadow: 0 1px 0 rgba(255, 255, 255, .03) inset, 0 12px 30px rgba(0, 0, 0, .4);
    }

    /* —— Header (top bar): logo · título centrado · logo + chrome del usuario —— */
    .p-header {
      height: 72px;
      flex: 0 0 72px;
      background: var(--portal-header-bg);
      color: var(--portal-header-ink);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 32px;
      border-bottom: 1px solid var(--portal-hairline);
    }

    .p-header__left {
      display: flex;
      align-items: center;
      gap: 14px;
      justify-self: start
    }

    .p-header__center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      justify-self: center
    }

    .p-header__right {
      display: flex;
      align-items: center;
      gap: 14px;
      justify-self: end
    }

    .p-logo {
      height: 52px;
      width: auto;
      display: block;
      image-rendering: auto;
    }

    .p-title {
      font-family: var(--f-display);
      font-size: 21px;
      font-weight: 600;
      line-height: 1.19;
      letter-spacing: 0.231px;
      color: var(--portal-header-ink);
      margin: 0;
      white-space: nowrap;
    }

    .p-subtitle {
      font-family: var(--f-text);
      font-size: 12px;
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.12px;
      color: var(--portal-mute);
      margin: 0;
    }

    /* User chrome */
    .p-user {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px 6px 6px;
      border-radius: 9999px;
      border: 1px solid var(--portal-hairline);
      background: var(--portal-bg);
      color: var(--portal-ink);
    }

    .p-avatar {
      width: 32px;
      height: 32px;
      border-radius: 9999px;
      background: linear-gradient(135deg, #0066cc 0%, #2997ff 100%);
      color: #fff;
      font-family: var(--f-text);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -.2px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .p-user__meta {
      display: flex;
      flex-direction: column;
      line-height: 1;
      gap: 2px;
      padding-right: 6px
    }

    .p-user__name {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.224px
    }

    .p-user__role {
      font-size: 11px;
      color: var(--portal-mute);
      letter-spacing: -0.08px
    }

    .p-signout {
      appearance: none;
      border: 0;
      cursor: pointer;
      background: var(--c-ink);
      color: var(--c-on-dark);
      font-family: var(--f-text);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: -0.224px;
      line-height: 1.29;
      border-radius: 8px;
      padding: 8px 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: transform .12s ease;
    }

    .p-signout:active {
      transform: scale(0.96)
    }

    .portal--dark .p-signout {
      background: var(--c-on-dark);
      color: var(--c-ink)
    }

    .p-signout svg {
      display: block
    }

    /* —— Main body —— */
    .p-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 80px 32px;
      background: var(--portal-bg);
      overflow: auto;
    }

    /* Hero / saludo */
    .p-hero {
      width: 100%;
      max-width: 1100px;
      text-align: center;
      margin: 0 auto 32px;
    }

    .p-hero__eyebrow {
      font-family: var(--f-text);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.29;
      letter-spacing: -0.224px;
      color: var(--portal-link);
      text-transform: none;
      margin: 0 0 12px;
    }

    .p-hero__title {
      font-family: var(--f-display);
      font-size: 48px;
      font-weight: 600;
      line-height: 1.07;
      letter-spacing: -0.56px;
      color: var(--portal-ink);
      margin: 0 0 8px;
    }

    .p-hero__title em {
      font-style: normal;
      font-weight: 600;
      color: var(--portal-link);
    }

    .p-hero__lead {
      font-family: var(--f-display);
      font-size: 24px;
      font-weight: 300;
      line-height: 1.45;
      letter-spacing: 0;
      color: var(--portal-subink);
      margin: 0 auto;
      max-width: 720px;
      text-wrap: pretty;
    }

    /* —— Grid de portales —— */
    .p-grid {
      width: 100%;
      max-width: 1180px;
      display: grid;
      grid-template-columns: repeat(var(--cols, 3), 1fr);
      gap: var(--gap, 28px);
    }

    .p-tile {
      appearance: none;
      border: 0;
      cursor: pointer;
      text-align: left;
      background: var(--portal-icon-bg);
      color: var(--portal-ink);
      border: 1px solid var(--portal-icon-border);
      border-radius: var(--tile-radius, 18px);
      padding: 16px 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
      font-family: var(--f-text);
      box-shadow: none;
      min-height: 180px;
    }

    .p-tile:hover {
      border-color: var(--portal-link);
      transform: translateY(-2px);
      box-shadow: var(--portal-shadow);
    }

    .p-tile:active {
      transform: scale(0.985)
    }

    .p-tile:focus-visible {
      outline: 2px solid var(--c-primary-focus);
      outline-offset: 2px
    }

    .p-tile__icon {
      width: var(--icon-size, 56px);
      height: var(--icon-size, 56px);
      border-radius: var(--icon-radius, 14px);
      background: var(--icon-fill, color-mix(in srgb, var(--portal-link) 12%, transparent));
      color: var(--portal-link);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .p-tile__icon svg {
      width: 60%;
      height: 60%;
      display: block
    }

    .p-tile__name {
      font-family: var(--f-display);
      font-size: 22px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.32px;
      color: var(--portal-ink);
      margin: 0;
    }

    .p-tile__desc {
      font-family: var(--f-text);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.43;
      letter-spacing: -0.224px;
      color: var(--portal-subink);
      margin: 0;
      flex: 1;
    }

    .p-tile__cta {
      font-family: var(--f-text);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.29;
      letter-spacing: -0.224px;
      color: var(--portal-link);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: auto;
    }

    .p-tile__cta svg {
      transition: transform .2s ease
    }

    .p-tile:hover .p-tile__cta svg {
      transform: translateX(3px)
    }

    /* Variant: round shape — circular icon, centered content, no description */
    .p-tile--round {
      align-items: center;
      text-align: center;
      padding: 36px 24px;
      min-height: var(--tile-min-h, 220px);
    }

    .p-tile--round .p-tile__icon {
      border-radius: 9999px;
      width: calc(var(--icon-size, 56px) * 1.4);
      height: calc(var(--icon-size, 56px) * 1.4);
    }

    .p-tile--round .p-tile__desc {
      display: none
    }

    .p-tile--round .p-tile__cta {
      margin-top: 6px
    }

    /* Variant: minimal — icon + name on one row, no card chrome */
    .p-tile--minimal {
      background: transparent;
      border: 1px solid var(--portal-divider);
      padding: 28px;
      flex-direction: row;
      align-items: center;
      gap: 18px;
      min-height: auto;
    }

    .p-tile--minimal .p-tile__body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .p-tile--minimal .p-tile__desc {
      font-size: 13px;
      flex: none
    }

    .p-tile--minimal .p-tile__cta {
      display: none
    }

    .p-tile--minimal .p-tile__chevron {
      color: var(--portal-mute);
      flex-shrink: 0;
    }

    /* —— Design canvas overrides for the artboard chrome —— */
    body {
      font-family: var(--f-text)
    }
  </style>

</head>

<body>

  <div id="root"></div>


  <script type="text/babel" data-presets="react">
    const { useState } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "iconSize": 120,
      "iconShape": "circle",
      "tileShape": "card",
      "tileRadius": 8,
      "cols": 3
    }/*EDITMODE-END*/;

    /* ─────────────── Portal data ─────────────── */

    const PORTALES = [
      {
        id: "movilidad",
        name: "Estatus de Movilidad",
        color: "#0066cc",
        url: "movilidad.html",
        glyph: (
          <img src="assets/movilidad.png" alt="Estatus de Movilidad" style={{ width: '60%', height: '60%', display: 'block', objectFit: 'contain' }} />
        ),
      },
      {
        id: "fce",
        name: "Factores Críticos de Éxito",
        color: "#0066cc",
        url: "fce.html",
        glyph: (
          <img src="assets/fce.png" alt="Factores Críticos de Éxito" style={{ width: '60%', height: '60%', display: 'block', objectFit: 'contain' }} />
        ),
      },
      {
        id: "ch",
        name: "Candado de Alcohol",
        color: "#0066cc",
        url: "#",
        glyph: (
          <img src="assets/candado.png" alt="Candado de Alcohol" style={{ width: '60%', height: '60%', display: 'block', objectFit: 'contain' }} />
        ),
      },
      {
        id: "pinpad",
        name: "Reporte de Hardware",
        color: "#0066cc",
        url: "pinpad.html",
        glyph: (
          <img src="assets/pinpad.png" alt="Estatus Pinpad" style={{ width: '60%', height: '60%', display: 'block', objectFit: 'contain' }} />
        ),
      },
      {
        id: "activo_fijo",
        name: "Activo Fijo TI",
        color: "#0066cc",
        url: "#",
        glyph: (
          <img src="assets/activo%20fijo.png" alt="Activo Fijo TI" style={{ width: '60%', height: '60%', display: 'block', objectFit: 'contain' }} />
        ),
      },
    ];

    /* ─────────────── Header ─────────────── */
    function Header({ user }) {
      const handleLogout = () => {
        localStorage.removeItem('user');
        window.location.href = '/login.html';
      };

      const getPlazaLogo = (plaza) => {
        if (!plaza) return null;
        let name = plaza.toUpperCase().trim();
        if (name === "CV VICTORIA") name = "CD VICTORIA";
        return `logos/${name}.png`;
      };

      const plazaLogo = getPlazaLogo(user.plaza);

      return (
        <header className="p-header" style={{height: 120, flex: '0 0 120px'}}>
          <div className="p-header__left" style={{gap: 20, alignItems: 'center'}}>
            <img className="p-logo" src="logos/tamaulipas.PNG" alt="OXXO Región Tamaulipas" style={{height:45}} />
            <img className="p-logo" src="logos/ti.png" alt="TI" style={{height:60}} />
            {plazaLogo && <img className="p-logo" src={plazaLogo} alt={`Plaza ${user.plaza}`} style={{height:80}} />}
          </div>

          <div className="p-header__center">
            <h1 className="p-title">TI Región Tamaulipas</h1>
            <p className="p-subtitle">Portal de aplicaciones</p>
          </div>

          <div className="p-header__right">
            <div className="p-user" role="group" aria-label="Usuario conectado">
              <div className="p-avatar" aria-hidden="true">{user.initials}</div>
              <div className="p-user__meta">
                <span className="p-user__name">{user.name}</span>
                <span className="p-user__role">{user.role}</span>
              </div>
            </div>
            <button className="p-signout" type="button" aria-label="Cerrar sesión" onClick={handleLogout}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <path d="m16 17 5-5-5-5" />
                <path d="M21 12H9" />
              </svg>
              Cerrar sesión
            </button>
          </div>
        </header>
      );
    }

    /* ─────────────── Tile ─────────────── */
    function Tile({ portal, shape, iconSize, iconShape, tileRadius }) {
      const iconStyle = {
        "--icon-size": iconSize + "px",
        "--icon-radius":
          iconShape === "circle" ? "9999px" :
            iconShape === "square" ? "0px" :
              iconShape === "soft" ? "10px" : "14px",
        "--icon-fill": "transparent",
      };
      const tileStyle = { "--tile-radius": tileRadius + "px" };

      const handleClick = () => {
        if (portal.url && portal.url !== "#") {
          window.location.href = portal.url;
        }
      };

      if (shape === "round") {
        return (
          <button className="p-tile p-tile--round" style={{ ...iconStyle, ...tileStyle }} onClick={handleClick}>
            <div className="p-tile__icon" style={{ borderRadius: 9999 }}>{portal.glyph}</div>
            <h3 className="p-tile__name">{portal.name}</h3>
            <span className="p-tile__cta">
              Abrir
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M5 12h14" /><path d="m12 5 7 7-7 7" />
              </svg>
            </span>
          </button>
        );
      }

      if (shape === "minimal") {
        return (
          <button className="p-tile p-tile--minimal" style={{ ...iconStyle, ...tileStyle }} onClick={handleClick}>
            <div className="p-tile__icon">{portal.glyph}</div>
            <div className="p-tile__body">
              <h3 className="p-tile__name">{portal.name}</h3>
              <p className="p-tile__desc">{portal.desc}</p>
            </div>
            <svg className="p-tile__chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
              <path d="m9 6 6 6-6 6" />
            </svg>
          </button>
        );
      }

      // default — card
      return (
        <button className="p-tile" style={{ ...iconStyle, ...tileStyle }} onClick={handleClick}>
          <div className="p-tile__icon">{portal.glyph}</div>
          <h3 className="p-tile__name">{portal.name}</h3>
          <span className="p-tile__cta" style={{ marginTop: 'auto' }}>
            Abrir portal
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M5 12h14" /><path d="m12 5 7 7-7 7" />
            </svg>
          </span>
        </button>
      );
    }

    /* ─────────────── Portal page ─────────────── */
    function Portal({ variant, t, user }) {
      const gridStyle = {
        "--cols": t.cols,
        "--gap": t.tileShape === "minimal" ? "16px" : "28px",
      };

      return (
        <section className={`portal portal--${variant}`} data-screen-label={`Portal · ${variant === "light" ? "Claro" : "Oscuro"}`}>
          <Header user={user} />

          <main className="p-main">
            <div className="p-hero">
              <p className="p-hero__eyebrow">Acceso autorizado · {new Date().toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long' })}</p>
              <h2 className="p-hero__title">Bienvenido, <em>{user.name.split(' ')[0]}</em>.</h2>
              <p className="p-hero__lead">Selecciona el portal al que deseas acceder.</p>
            </div>

            <div className="p-grid" style={gridStyle}>
              {PORTALES.map(p => (
                <Tile
                  key={p.id}
                  portal={p}
                  shape={t.tileShape}
                  iconSize={t.iconSize}
                  iconShape={t.iconShape}
                  tileRadius={t.tileRadius}
                />
              ))}
            </div>
          </main>
        </section>
      );
    }

    /* ─────────────── App ─────────────── */
    function App() {
      const [loggedUser, setLoggedUser] = React.useState(null);

      React.useEffect(() => {
        const savedUser = localStorage.getItem('user');
        if (savedUser) {
          const parsed = JSON.parse(savedUser);
          const names = parsed.usuario.split(' ');
          const initials = names.length > 1 ? names[0][0] + names[1][0] : names[0][0];
          setLoggedUser({
            name: parsed.usuario,
            initials: initials.toUpperCase(),
            role: parsed.rol || "Usuario",
            plaza: parsed.plaza
          });
        } else {
          window.location.href = '/login.html';
        }
      }, []);

      if (!loggedUser) return null;

      return <Portal variant="light" t={TWEAK_DEFAULTS} user={loggedUser} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

</body>

</html>
